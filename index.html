    <div class="min-h-screen bg-jb-bg" data-controller="notes">
  <button data-action="click->notes#toggleSidebar"
          class="sidebar-toggle-btn fixed top-3 left-3 z-50 lg:hidden flex items-center justify-center"
          type="button"
          aria-label="Toggle sidebar">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">

    <div data-notes-target="sidebar" class="island-sidebar w-72 flex-shrink-0 flex flex-col p-4 m-3 sidebar-panel">
  <div data-action="click->notes#toggleSidebar" class="sidebar-backdrop lg:hidden"></div>

  <div class="flex items-center justify-between pb-3 mb-2 border-b border-jb-border">
    <span class="text-xs font-semibold uppercase tracking-wider text-jb-muted">Project Notes</span>
    <div class="flex items-center gap-2">
      <button type="button" class="lg:hidden w-5 h-5 flex items-center justify-center text-jb-muted hover:text-jb-text" data-action="click->notes#toggleSidebar" aria-label="Close sidebar">

          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
      <button class="btn-jb-accent" data-action="click->notes#createNewNote">+ New Note</button>
    </div>
  </div>

  <div data-notes-target="list" class="flex-1 overflow-auto">
  </div>
</div>


    <div class="flex-1 flex flex-col p-3 lg:p-4 pt-14 lg:pt-4 min-w-0">
      <div class="island-panel flex-1 flex flex-col p-4 lg:p-6 overflow-hidden">
        <div data-notes-target="editor" class="hidden flex-1 flex flex-col min-h-0">
  <input type="hidden" data-notes-target="id">

  <div class="pb-3 mb-3 border-b border-jb-border flex-shrink-0">
    <input type="text" data-notes-target="title" class="jb-input text-lg md:text-xl font-bold" placeholder="Untitled_Note.md">
  </div>

  <div class="flex-1 relative flex items-stretch min-h-0 gap-3">
    <div class="relative flex flex-col flex-1 min-w-0">
      <input type="hidden" id="note_content_hidden" data-notes-target="content">

      <trix-editor input="note_content_hidden"
                   class="trix-content font-mono flex-1"
                   placeholder="// Start writing..."
                   data-action="trix-change->notes#updateWordCount trix-initialize->notes#onTrixInit"></trix-editor>

      <div class="flex items-center justify-between pt-2 mt-2 border-t border-jb-border flex-shrink-0">
        <div data-notes-target="wordCount" class="status-pill relative bottom-auto right-auto">
          0 words · 0 chars
        </div>
      </div>
    </div>

    <div class="relative flex-shrink-0">
      <div class="island-dock">

    <button type="button" class="color-swatch" style="background-color: rgba(144, 202, 249, 0.4);" data-action="click->notes#applyFormat" data-format-type="highlight" data-value="rgba(144, 202, 249, 0.4)" title="Blue Highlighter"></button>
    <button type="button" class="color-swatch" style="background-color: rgba(239, 154, 154, 0.4);" data-action="click->notes#applyFormat" data-format-type="highlight" data-value="rgba(239, 154, 154, 0.4)" title="Red Highlighter"></button>
    <button type="button" class="color-swatch" style="background-color: rgba(165, 214, 167, 0.4);" data-action="click->notes#applyFormat" data-format-type="highlight" data-value="rgba(165, 214, 167, 0.4)" title="Green Highlighter"></button>
  </div>

  <div class="dock-divider"></div>

  <button class="dock-tool-btn" title="Header Element" data-action="click->notes#applyFormat" data-format-type="heading1">
    <svg viewBox="0 0 24 24"><path d="M19 12h-6V5h-2v7H5V5H3v14h2v-5h6v5h2v-5h6v5h2V5h-2z"/></svg>

  </button>

  <div class="dock-divider"></div>
