<!DOCTYPE html>
<html>
  <head>
    <title>Offline — Jotted</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #f8f9fa;
        color: #191c1e;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 1rem;
      }
      .offline-card {
        text-align: center;
        max-width: 400px;
      }
      .offline-card h1 {
        font-size: 1.25rem;
        margin-bottom: 0.5rem;
        color: #3574f0;
      }
      .offline-card p {
        font-size: 0.875rem;
        color: #6c707e;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="offline-card">
      <h1>You're offline</h1>
      <p>Your notes are still available — Jotted saves everything locally in your browser.</p>
    </div>
  </body>
</html>
